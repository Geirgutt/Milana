<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Hunden i Teppet</title>
  <script>
    const assetVersion = Date.now();
    const stylesheet = document.createElement("link");
    stylesheet.rel = "stylesheet";
    stylesheet.href = `styles.css?v=${assetVersion}`;
    document.head.appendChild(stylesheet);
  </script>
</head>
<body>
  <main class="app-shell">
    <section class="game-frame" aria-label="Spill">
      <canvas id="game" width="1200" height="800" aria-label="Spillflate"></canvas>

      <div class="overlay top-left">
        <button id="helpButton" class="icon-button" aria-label="Vis hjelp">?</button>
      </div>

      <div class="overlay top-right">
        <button id="soundButton" class="pill-button secondary">Lyd: På</button>
        <button id="sniffButton" class="pill-button">Snus</button>
        <button id="restartButton" class="pill-button secondary">Start på nytt</button>
      </div>

      <div id="storyPanel" class="story-panel hidden" aria-live="polite">
        <p id="storySpeaker" class="story-speaker"></p>
        <p id="storyText" class="story-text"></p>
        <button id="storyNextButton" class="pill-button story-next">Neste</button>
      </div>

      <div class="overlay bottom-right joystick-wrap" aria-hidden="true">
        <div id="joystickBase" class="joystick-base">
          <div id="joystickKnob" class="joystick-knob"></div>
        </div>
      </div>
    </section>
  </main>

  <dialog id="helpDialog" class="help-dialog">
    <form method="dialog" class="help-card">
      <div class="help-header">
        <h2>Hvordan spille</h2>
        <button class="icon-button close-button" value="close" aria-label="Lukk hjelp">×</button>
      </div>
      <ul>
        <li>På mobil bruker du joysticken nederst til høyre eller drar på spillflaten.</li>
        <li>På PC bruker du piltaster eller WASD.</li>
        <li>Snus viser pil mot neste viktige mål.</li>
        <li>Trykk Neste i dialogboksen for å fortsette historien.</li>
      </ul>
    </form>
  </dialog>

  <script>
    const gameScript = document.createElement("script");
    gameScript.src = `game.js?v=${assetVersion}`;
    document.body.appendChild(gameScript);
  </script>
</body>
</html>
